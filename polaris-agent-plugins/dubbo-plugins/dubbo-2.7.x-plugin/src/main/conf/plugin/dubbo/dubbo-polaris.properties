# Polaris server address (Dubbo plugin)
dubbo.registry.address=polaris://127.0.0.1:8091
# Location info (auto-injected by start.sh from Tencent Cloud metadata)
# Tencent Cloud region -> Polaris zone, Tencent Cloud zone -> Polaris campus, Polaris region N/A
dubbo.registry.parameters.polaris_metadata_content_zone=""
dubbo.registry.parameters.polaris_metadata_content_campus=""
