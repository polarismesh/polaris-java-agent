# Polaris server address (Dubbo plugin)
dubbo.registry.address=polaris://127.0.0.1:8091
# Location info (auto-injected by start.sh from Tencent Cloud metadata)
# Tencent Cloud region -> Polaris zone, Tencent Cloud zone -> Polaris campus, Polaris region N/A
dubbo.registry.parameters.polaris_metadata_content_zone=""
dubbo.registry.parameters.polaris_metadata_content_campus=""

# === config-center (Polaris) ===
# Polaris 配置中心地址。注意默认端口 8093,与 registry 的 8091 不同
dubbo.config-center.address=polaris://127.0.0.1:8093
# 可选: token / 加密参数等,透传到 polaris-adapter-dubbo
# dubbo.config-center.parameters.token=

# Polaris config-center 注入开关
# 默认 true。设为 false 让 Dubbo 走原 config-center
# (例如灰度阶段保留原 nacos config-center,只用 polaris 做 registry)
# polaris.agent.dubbo.config-center.enabled=true
